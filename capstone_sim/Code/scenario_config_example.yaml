# Example scenario configuration for dataset capture
# Created by setup_scenario.py, then edited for your capture needs
#
# Usage: python capture_dataset.py scenario_config.yaml

scenario_name: "example_capture"

# Camera position and settings (set interactively via setup_scenario.py)
camera:
  location:
    x: 12.5
    y: -45.3
    z: 8.0
  rotation:
    pitch: -25.0
    yaw: 90.0
    roll: 0.0
  image_width: 1280
  image_height: 720
  fov: 70                    # field of view in degrees

# Traffic light to associate with (CARLA actor id)
traffic_light:
  id: 107

# Weather conditions
weather:
  cloudiness: 40.0            # 0-100 (higher = more overcast)
  precipitation: 0.0          # 0-100 (rain intensity)
  sun_altitude_angle: 25.0    # -90 to 90 (-90=night, 90=noon)
  fog_density: 0.0            # 0-100
  wetness: 0.0                # 0-100

# Simulation duration and capture settings
simulation:
  total_frames: 5000          # total simulation frames to run
  capture_interval: 10        # capture an image every N frames
  warmup_frames: 100          # let vehicles settle before capturing
  train_ratio: 0.8            # fraction of images for training (rest = val)
  fixed_delta_seconds: 0.05   # physics timestep (0.05 = 20 FPS)

# Vehicle spawning configuration
spawn:
  max_vehicles: 30            # max concurrent vehicles in the world
  spawn_radius: 100.0         # only use spawn points within this distance of the traffic light (meters)
  respawn_interval: 50        # check/respawn vehicles every N frames
  despawn_distance: 150.0     # remove vehicles farther than this (meters)
  ratios:                     # relative spawn ratios per vehicle class
    car: 15                   # normal passenger cars
    ambulance: 2
    bus: 2
    truck: 3
    police_car: 2
    fire_truck: 1
    bike: 4                   # motorcycles and bicycles

# Output settings
output:
  directory: "./dataset_output"   # YOLO dataset will be saved here
